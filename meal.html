<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="theme-color" content="#111111">
  <title>Fast & Weight Log</title>
  <link rel="manifest" href="manifest.json">
  <link rel="apple-touch-icon" href="icon-192.png">
  <style>
    :root {
      --bg:      #111111;
      --surface: #1a1a1a;
      --border:  #2a2a2a;
      --text:    #e0e0e0;
      --dim:     #555555;
      --orange:  #FFAA00;
      --green:   #88DD88;
      --cyan:    #00CCFF;
      --yellow:  #FFE066;
      --pink:    #FF88CC;
      --mint:    #55DDBB;
      --red:     #FF6666;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: -apple-system, 'Segoe UI', sans-serif;
      font-size: 15px;
      min-height: 100vh;
      padding: 16px;
      max-width: 480px;
      margin: 0 auto;
    }

    /* ── Streak card ── */
    .streak-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 14px 16px;
      margin-bottom: 12px;
      display: flex;
      align-items: center;
      gap: 14px;
    }
    .streak-fire { font-size: 32px; line-height: 1; }
    .streak-info { flex: 1; }
    .streak-num  { font-size: 28px; font-weight: 700; color: var(--orange); line-height: 1; }
    .streak-num span { font-size: 14px; font-weight: 400; color: var(--dim); margin-left: 4px; }
    .streak-sub  { color: var(--dim); font-size: 12px; margin-top: 3px; }
    .streak-best { font-size: 12px; color: var(--dim); text-align: right; }
    .streak-best strong { color: var(--yellow); }
    .streak-btn {
      margin-top: 10px;
      width: 100%;
      padding: 10px;
      border-radius: 8px;
      border: none;
      font-size: 14px;
      font-weight: 600;
      cursor: pointer;
      transition: background 0.2s, transform 0.1s;
    }
    .streak-btn:active { transform: scale(0.97); }
    .streak-btn.ready  { background: var(--orange); color: #111; }
    .streak-btn.done   { background: var(--border); color: var(--dim); cursor: default; }
    .streak-btn.early  { background: var(--border); color: var(--dim); cursor: default; }
    .streak-btn:disabled { cursor: default; }

    /* ── Chicken bar ── */
    .chicken-bar {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 12px 16px;
      margin-bottom: 12px;
    }
    .chicken-bar-labels {
      display: flex;
      justify-content: space-between;
      font-size: 11px;
      color: var(--dim);
      margin-bottom: 6px;
    }
    .chicken-bar-labels .active-label { color: var(--orange); font-weight: 600; }
    .chicken-track {
      position: relative;
      height: 28px;
      background: var(--border);
      border-radius: 14px;
      overflow: visible;
    }
    .chicken-fill {
      height: 100%;
      background: linear-gradient(90deg, #ff6600, #FFAA00);
      border-radius: 14px;
      transition: width 1s ease;
      min-width: 0;
    }
    .chicken-icon {
      position: absolute;
      top: 50%;
      transform: translate(-50%, -50%) scaleX(-1);
      font-size: 22px;
      transition: left 1s ease;
      filter: drop-shadow(0 0 4px rgba(255,170,0,0.6));
      z-index: 2;
      line-height: 1;
    }
    .chicken-time { text-align: center; font-size: 12px; color: var(--dim); margin-top: 6px; }
    .chicken-time span { color: var(--yellow); font-weight: 600; }

    /* ── Nav buttons (workout) ── */
    .nav-btn {
      display: flex;
      align-items: center;
      justify-content: space-between;
      background: var(--surface);
      border: 1px solid var(--border);
      border-left: 3px solid var(--orange);
      border-radius: 12px;
      padding: 14px 16px;
      margin-bottom: 10px;
      text-decoration: none;
      color: var(--text);
      transition: opacity 0.15s;
    }
    .nav-btn:active { opacity: 0.7; }
    .nav-btn-left { display: flex; align-items: center; gap: 12px; }
    .nav-btn-icon  { font-size: 24px; line-height: 1; }
    .nav-btn-label { font-size: 14px; font-weight: 700; color: var(--orange); }
    .nav-btn-sub   { font-size: 11px; color: var(--dim); margin-top: 2px; }
    .nav-btn-arrow { color: var(--dim); font-size: 18px; }

    /* ── Weight card (split: link header + quick-add body) ── */
    .weight-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-left: 3px solid var(--cyan);
      border-radius: 12px;
      margin-bottom: 10px;
      overflow: hidden;
    }
    .weight-card-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 14px 16px 12px;
      text-decoration: none;
      color: var(--text);
      transition: opacity 0.15s;
    }
    .weight-card-header:active { opacity: 0.7; }
    .weight-card-left { display: flex; align-items: center; gap: 12px; }
    .weight-card-icon  { font-size: 24px; line-height: 1; }
    .weight-card-label { font-size: 14px; font-weight: 700; color: var(--cyan); }
    .weight-card-sub   { font-size: 11px; color: var(--dim); margin-top: 2px; }
    .weight-card-arrow { color: var(--dim); font-size: 18px; }

    .weight-card-body {
      border-top: 1px solid var(--border);
      padding: 12px 16px;
    }

    /* not-yet-logged state */
    .quick-add-row {
      display: flex;
      gap: 8px;
      align-items: center;
    }
    .quick-add-row input {
      flex: 1;
      background: var(--bg);
      border: 1px solid var(--border);
      border-radius: 8px;
      color: var(--text);
      font-size: 17px;
      font-weight: 600;
      padding: 9px 13px;
      outline: none;
      -moz-appearance: textfield;
    }
    .quick-add-row input::-webkit-outer-spin-button,
    .quick-add-row input::-webkit-inner-spin-button { -webkit-appearance: none; }
    .quick-add-row input:focus { border-color: var(--cyan); }
    .quick-add-row input::placeholder { color: var(--dim); font-weight: 400; }
    .quick-log-btn {
      background: var(--cyan);
      color: #111;
      border: none;
      border-radius: 8px;
      font-size: 13px;
      font-weight: 700;
      padding: 9px 16px;
      cursor: pointer;
      transition: transform 0.1s;
      letter-spacing: 0.3px;
      white-space: nowrap;
    }
    .quick-log-btn:active { transform: scale(0.96); }

    /* logged state */
    .quick-logged-row {
      display: flex;
      align-items: center;
      justify-content: space-between;
    }
    .quick-logged-left { display: flex; align-items: baseline; gap: 6px; }
    .quick-logged-val  { font-size: 28px; font-weight: 700; color: var(--cyan); line-height: 1; }
    .quick-logged-unit { font-size: 13px; color: var(--dim); }
    .quick-logged-badge {
      font-size: 11px;
      font-weight: 600;
      color: var(--green);
      background: rgba(136,221,136,0.1);
      border: 1px solid rgba(136,221,136,0.25);
      border-radius: 6px;
      padding: 2px 7px;
    }
    .quick-edit-btn {
      background: var(--border);
      color: var(--dim);
      border: none;
      border-radius: 8px;
      font-size: 12px;
      padding: 6px 12px;
      cursor: pointer;
    }

    /* ── Confetti ── */
    .confetti-piece {
      position: fixed;
      width: 10px;
      height: 10px;
      top: -10px;
      border-radius: 2px;
      pointer-events: none;
      animation: confetti-fall linear forwards;
    }
    @keyframes confetti-fall {
      0%   { transform: translateY(0) rotate(0deg);      opacity: 1; }
      100% { transform: translateY(100vh) rotate(720deg); opacity: 0; }
    }

    /* ── Footer ── */
    .footer { text-align: center; color: var(--border); font-size: 11px; margin-top: 8px; padding-bottom: 8px; }
  </style>
</head>
<body>
<script>
// ── Utilities ─────────────────────────────────────────────
function pad(n) { return String(n).padStart(2, '0'); }
function fmt12(h, m) {
  const ampm = h < 12 ? 'am' : 'pm';
  return `${h % 12 || 12}:${pad(m)} ${ampm}`;
}
function dateStr(d) {
  return `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`;
}

// ── Weight helpers ────────────────────────────────────────
function loadWeightLog() {
  try { return JSON.parse(localStorage.getItem('weightLog')) || []; }
  catch { return []; }
}
function saveWeightEntry(lbs) {
  const log = loadWeightLog();
  const today = dateStr(new Date());
  const idx = log.findIndex(e => e.date === today);
  if (idx >= 0) log[idx].weight = lbs;
  else log.push({ date: today, weight: lbs });
  log.sort((a, b) => a.date.localeCompare(b.date));
  localStorage.setItem('weightLog', JSON.stringify(log));
}
function getTodayWeight() {
  const today = dateStr(new Date());
  return loadWeightLog().find(e => e.date === today) || null;
}

// ── Fasting streak ────────────────────────────────────────
function loadStreak() {
  try { const d = JSON.parse(localStorage.getItem('fastStreak')); return d ? { total: 0, ...d } : { streak: 0, best: 0, total: 0, lastDate: null }; }
  catch { return { streak: 0, best: 0, total: 0, lastDate: null }; }
}
function claimStreak() {
  const now = new Date(), today = dateStr(now), data = loadStreak();
  if (data.lastDate === today) return data;
  const y = new Date(now); y.setDate(y.getDate() - 1);
  const yesterday = dateStr(y);
  const newStreak = data.lastDate === yesterday ? data.streak + 1 : 1;
  const updated = { streak: newStreak, best: Math.max(newStreak, data.best || 0), total: (data.total || 0) + 1, lastDate: today };
  localStorage.setItem('fastStreak', JSON.stringify(updated));
  return updated;
}

// ── Confetti ──────────────────────────────────────────────
function confetti(count = 80) {
  const colors = ['#FFAA00','#00CCFF','#FF88CC','#88DD88','#FFE066','#55DDBB','#FF6666'];
  for (let i = 0; i < count; i++) {
    const el = document.createElement('div');
    el.className = 'confetti-piece';
    el.style.left = Math.random() * 100 + 'vw';
    el.style.background = colors[Math.floor(Math.random() * colors.length)];
    el.style.width  = (Math.random() * 8 + 6) + 'px';
    el.style.height = (Math.random() * 8 + 6) + 'px';
    el.style.animationDuration = (Math.random() * 2 + 1.5) + 's';
    el.style.animationDelay   = (Math.random() * 0.5) + 's';
    el.style.borderRadius = Math.random() > 0.5 ? '50%' : '2px';
    document.body.appendChild(el);
    el.addEventListener('animationend', () => el.remove());
  }
}
function claimAndCelebrate() { claimStreak(); confetti(); renderStreakCard(); }

// ── Quick-add weight ──────────────────────────────────────
function quickLogWeight() {
  const inp = document.getElementById('quickWeightInput');
  const val = parseFloat(inp.value);
  if (isNaN(val) || val < 50 || val > 700) {
    inp.focus();
    return;
  }
  saveWeightEntry(val);
  renderWeightCard();
}

function quickEditWeight() {
  renderWeightCard(true);
}

// ── Streak card ───────────────────────────────────────────
function renderStreakCard() {
  const now = new Date();
  const today = dateStr(now);
  const sd = loadStreak();
  const isPast12 = now.getHours() >= 12;
  const claimedToday = sd.lastDate === today;
  const fireEmoji = sd.streak >= 30 ? '🔥🔥🔥' : sd.streak >= 7 ? '🔥🔥' : '🔥';
  const streakSub = claimedToday
    ? `${sd.streak} day${sd.streak !== 1 ? 's' : ''} in a row — fasted!`
    : sd.streak === 0 ? 'Tap below once you hit 12pm'
    : `${sd.streak} day${sd.streak !== 1 ? 's' : ''} — keep it going!`;

  let btnClass, btnText, btnAttrs;
  if (claimedToday)  { btnClass = 'done';  btnText = '✓ Fasted today';             btnAttrs = 'disabled'; }
  else if (isPast12) { btnClass = 'ready'; btnText = '🔥 I fasted today';           btnAttrs = 'onclick="claimAndCelebrate()"'; }
  else               { btnClass = 'early'; btnText = '⏳ Window opens at 12:00 pm'; btnAttrs = 'disabled'; }

  document.getElementById('streakCard').innerHTML = `
    <div class="streak-fire">${fireEmoji}</div>
    <div class="streak-info">
      <div class="streak-num">${sd.streak}<span>day streak</span></div>
      <div class="streak-sub">${streakSub}</div>
      <button class="streak-btn ${btnClass}" ${btnAttrs}>${btnText}</button>
    </div>
    <div class="streak-best">best<br><strong>${sd.best}</strong><br><br>total<br><strong>${sd.total}</strong></div>`;
}

// ── Weight card ───────────────────────────────────────────
function renderWeightCard(forceEdit = false) {
  const entry = getTodayWeight();
  let bodyHTML;

  if (entry && !forceEdit) {
    bodyHTML = `
      <div class="quick-logged-row">
        <div class="quick-logged-left">
          <div class="quick-logged-val">${entry.weight}</div>
          <div class="quick-logged-unit">lbs</div>
          <div class="quick-logged-badge">&#10003; logged today</div>
        </div>
        <button class="quick-edit-btn" onclick="quickEditWeight()">&#9999;&#65039; edit</button>
      </div>`;
  } else {
    const pre = (forceEdit && entry) ? entry.weight : '';
    bodyHTML = `
      <div class="quick-add-row">
        <input type="number" id="quickWeightInput" placeholder="Enter weight (lbs)"
               step="0.1" min="50" max="700" value="${pre}" inputmode="decimal"
               onkeydown="if(event.key==='Enter')quickLogWeight()">
        <button class="quick-log-btn" onclick="quickLogWeight()">LOG</button>
      </div>`;
  }

  document.getElementById('weightCard').innerHTML = `
    <a class="weight-card-header" href="weight.html">
      <div class="weight-card-left">
        <span class="weight-card-icon">&#9878;&#65039;</span>
        <div>
          <div class="weight-card-label">Weight Tracker</div>
          <div class="weight-card-sub">Tap to see full history &amp; chart</div>
        </div>
      </div>
      <span class="weight-card-arrow">&#8594;</span>
    </a>
    <div class="weight-card-body">${bodyHTML}</div>`;

  if (!entry || forceEdit) {
    const inp = document.getElementById('quickWeightInput');
    if (inp && forceEdit) inp.focus();
  }
}

// ── Chicken bar ───────────────────────────────────────────
function renderChickenBar() {
  const now = new Date();
  const h = now.getHours(), m = now.getMinutes();
  const WINDOW_START = 12 * 60, WINDOW_END = 20 * 60;
  const totalMins = h * 60 + m;
  const pct = Math.min(100, Math.max(0, (totalMins - WINDOW_START) / (WINDOW_END - WINDOW_START) * 100));
  const isFasting = totalMins < WINDOW_START;
  const isDone    = totalMins >= WINDOW_END;

  let timeLabel;
  if (isFasting) {
    const rem = WINDOW_START - totalMins;
    timeLabel = `window opens in <span>${Math.floor(rem/60)}h ${pad(rem%60)}m</span>`;
  } else if (isDone) {
    timeLabel = `fasting until <span>12:00 pm</span> — good work 🎉`;
  } else {
    const rem = WINDOW_END - totalMins;
    timeLabel = `<span>${Math.floor(rem/60)}h ${pad(rem%60)}m</span> left in window`;
  }

  document.getElementById('chickenBar').innerHTML = `
    <div class="chicken-bar-labels">
      <span class="${!isFasting && !isDone ? 'active-label' : ''}">12 pm</span>
      <span>eating window</span>
      <span class="${isDone ? 'active-label' : ''}">8 pm</span>
    </div>
    <div class="chicken-track">
      <div class="chicken-fill" style="width:${pct}%"></div>
      <div class="chicken-icon" style="left:${Math.max(4, Math.min(96, pct))}%">🐔</div>
    </div>
    <div class="chicken-time">${timeLabel}</div>`;
}

// ── Tick ──────────────────────────────────────────────────
function tick() {
  renderStreakCard();
  renderChickenBar();
  const now = new Date();
  document.getElementById('footer').textContent = `updated ${fmt12(now.getHours(), now.getMinutes())}`;
}

// ── Init ──────────────────────────────────────────────────
function init() {
  document.body.innerHTML = `
    <div class="streak-card" id="streakCard"></div>
    <div class="chicken-bar" id="chickenBar"></div>
    <a class="nav-btn" href="workout.html">
      <div class="nav-btn-left">
        <span class="nav-btn-icon">&#128170;</span>
        <div>
          <div class="nav-btn-label">Workout Schedule</div>
          <div class="nav-btn-sub">Bodyweight &mdash; check off today's session</div>
        </div>
      </div>
      <span class="nav-btn-arrow">&#8594;</span>
    </a>
    <div class="weight-card" id="weightCard"></div>
    <div class="footer" id="footer"></div>`;

  renderStreakCard();
  renderChickenBar();
  renderWeightCard();
  tick();
}

init();
setInterval(tick, 60000);

if ('serviceWorker' in navigator) {
  navigator.serviceWorker.register('./sw.js');
}
</script>
</body>
</html>
