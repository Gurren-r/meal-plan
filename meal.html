<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="theme-color" content="#111111">
  <title>Meal Plan</title>
  <link rel="manifest" href="manifest.json">
  <link rel="apple-touch-icon" href="icon-192.png">
  <style>
    :root {
      --bg:        #111111;
      --surface:   #1a1a1a;
      --border:    #2a2a2a;
      --text:      #e0e0e0;
      --dim:       #555555;
      --orange:    #FFAA00;
      --green:     #88DD88;
      --cyan:      #00CCFF;
      --yellow:    #FFE066;
      --pink:      #FF88CC;
      --mint:      #55DDBB;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: -apple-system, 'Segoe UI', sans-serif;
      font-size: 15px;
      min-height: 100vh;
      padding: 16px;
      max-width: 480px;
      margin: 0 auto;
    }

    /* ── Day header ── */
    .day-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-top: 3px solid var(--orange);
      border-radius: 12px;
      padding: 14px 16px;
      margin-bottom: 12px;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }
    .day-num {
      color: var(--orange);
      font-size: 20px;
      font-weight: 700;
      letter-spacing: 1px;
    }
    .day-meta { text-align: right; }
    .day-cal  { color: var(--green); font-size: 14px; font-weight: 600; }
    .day-fast { color: var(--dim); font-size: 12px; margin-top: 2px; }

    /* ── Meal cards ── */
    .meal-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 14px 16px;
      margin-bottom: 10px;
    }

    .meal-header {
      display: flex;
      align-items: center;
      gap: 10px;
      margin-bottom: 10px;
      padding-bottom: 10px;
      border-bottom: 1px solid var(--border);
    }
    .meal-icon  { font-size: 20px; }
    .meal-info  { flex: 1; }
    .meal-label { font-weight: 700; font-size: 14px; letter-spacing: 0.5px; }
    .meal-time  { color: var(--dim); font-size: 12px; margin-top: 1px; }
    .meal-cal   { color: var(--green); font-size: 13px; font-weight: 600; }

    .breakfast .meal-label { color: var(--cyan); }
    .snack     .meal-label { color: var(--yellow); }
    .dinner    .meal-label { color: var(--pink); }
    .evening   .meal-label { color: var(--mint); }

    .breakfast { border-left: 3px solid var(--cyan); }
    .snack     { border-left: 3px solid var(--yellow); }
    .dinner    { border-left: 3px solid var(--pink); }
    .evening   { border-left: 3px solid var(--mint); }

    /* ── Food items ── */
    .food-list { display: flex; flex-direction: column; gap: 6px; }

    .food-item {
      display: flex;
      justify-content: space-between;
      align-items: baseline;
      gap: 8px;
    }
    .food-name { color: var(--text); font-size: 14px; }
    .food-dots {
      flex: 1;
      border-bottom: 1px dotted var(--border);
      margin: 0 4px 3px;
    }
    .food-qty  { color: var(--dim); font-size: 13px; white-space: nowrap; }

    /* ── Fasting screen ── */
    .fasting-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-top: 3px solid var(--cyan);
      border-radius: 12px;
      padding: 32px 20px;
      text-align: center;
      margin-bottom: 10px;
    }
    .fasting-title    { color: var(--cyan); font-size: 18px; font-weight: 700; letter-spacing: 1px; margin-bottom: 4px; }
    .fasting-sub      { color: var(--dim); font-size: 13px; margin-bottom: 24px; }
    .fasting-countdown { color: var(--yellow); font-size: 48px; font-weight: 700; line-height: 1; margin-bottom: 6px; }
    .fasting-label    { color: var(--dim); font-size: 13px; }

    /* ── Streak card ── */
    .streak-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 14px 16px;
      margin-bottom: 12px;
      display: flex;
      align-items: center;
      gap: 14px;
    }
    .streak-fire { font-size: 32px; line-height: 1; }
    .streak-info { flex: 1; }
    .streak-num  { font-size: 28px; font-weight: 700; color: var(--orange); line-height: 1; }
    .streak-num span { font-size: 14px; font-weight: 400; color: var(--dim); margin-left: 4px; }
    .streak-sub  { color: var(--dim); font-size: 12px; margin-top: 3px; }
    .streak-best { font-size: 12px; color: var(--dim); text-align: right; }
    .streak-best strong { color: var(--yellow); }

    /* ── Chicken progress bar ── */
    .chicken-bar {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 12px 16px;
      margin-bottom: 12px;
    }
    .chicken-bar-labels {
      display: flex;
      justify-content: space-between;
      font-size: 11px;
      color: var(--dim);
      margin-bottom: 6px;
    }
    .chicken-bar-labels .active-label { color: var(--orange); font-weight: 600; }
    .chicken-track {
      position: relative;
      height: 28px;
      background: var(--border);
      border-radius: 14px;
      overflow: visible;
    }
    .chicken-fill {
      height: 100%;
      background: linear-gradient(90deg, #ff6600, #FFAA00);
      border-radius: 14px;
      transition: width 1s ease;
      min-width: 0;
    }
    .chicken-icon {
      position: absolute;
      top: 50%;
      transform: translate(-50%, -50%) scaleX(-1);
      font-size: 22px;
      transition: left 1s ease;
      filter: drop-shadow(0 0 4px rgba(255,170,0,0.6));
      z-index: 2;
      line-height: 1;
    }
    .chicken-time {
      text-align: center;
      font-size: 12px;
      color: var(--dim);
      margin-top: 6px;
    }
    .chicken-time span { color: var(--yellow); font-weight: 600; }

    /* ── Footer ── */
    .footer {
      text-align: center;
      color: var(--border);
      font-size: 11px;
      margin-top: 8px;
      padding-bottom: 8px;
    }
  </style>
</head>
<body>

const MEAL_ORDER = [
  { key: 'breakfast', label: 'BREAK FAST',   cls: 'breakfast', icon: '🍳', threshold: 12 * 60 },
  { key: 'snack',     label: 'SNACK',         cls: 'snack',     icon: '🥜', threshold: 15 * 60 + 30 },
  { key: 'dinner',    label: 'DINNER',        cls: 'dinner',    icon: '🍽️', threshold: 18 * 60 + 30 },
  { key: 'evening',   label: 'EVENING SNACK', cls: 'evening',   icon: '🍫', threshold: 19 * 60 + 30 },
];

function seededRandom(seed) {
  let s = seed % 2147483647;
  s = (s * 16807) % 2147483647;
  return (s - 1) / 2147483646;
}

function planIndex() {
  const now = new Date();
  // Shift back 12 hours so that 12pm acts as the day boundary
  const shifted = new Date(now.getTime() - 12 * 60 * 60 * 1000);
  const epoch = new Date(2024, 0, 1);
  const days = Math.floor((shifted - epoch) / (24 * 60 * 60 * 1000));
  return ((days % DAYS.length) + DAYS.length) % DAYS.length;
}

// ── Fasting streak ──────────────────────────────────────────
function dateStr(d) {
  return `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`;
}

function loadStreak() {
  try { return JSON.parse(localStorage.getItem('fastStreak')) || { streak: 0, best: 0, lastDate: null }; }
  catch { return { streak: 0, best: 0, lastDate: null }; }
}

function recordStreak() {
  const now   = new Date();
  const today = dateStr(now);
  const data  = loadStreak();
  if (now.getHours() < 12) return data; // before noon — not earned yet
  if (data.lastDate === today) return data; // already recorded today

  const yesterday = dateStr(new Date(now.getTime() - 24 * 60 * 60 * 1000));
  const newStreak = data.lastDate === yesterday ? data.streak + 1 : 1;
  const newBest   = Math.max(newStreak, data.best || 0);
  const updated   = { streak: newStreak, best: newBest, lastDate: today };
  localStorage.setItem('fastStreak', JSON.stringify(updated));
  return updated;
}

function pad(n) { return String(n).padStart(2, '0'); }

function fmt12(h, m) {
  const ampm = h < 12 ? 'am' : 'pm';
  return `${h % 12 || 12}:${pad(m)} ${ampm}`;
}

function render() {
  const now = new Date();
  const h = now.getHours(), m = now.getMinutes();
  const day = DAYS[planIndex()];
  let html = '';

  // Day header card
  html += `
    <div class="day-card">
      <div class="day-num">TODAY'S PLAN</div>
      <div class="day-meta">
        <div class="day-cal">${day.cal}</div>
        <div class="day-fast">12 pm – 8 pm window</div>
      </div>
    </div>`;

  // Streak card
  const sd = recordStreak();
  const fireEmoji = sd.streak >= 30 ? '🔥🔥🔥' : sd.streak >= 7 ? '🔥🔥' : '🔥';
  const streakSub = sd.streak === 0
    ? 'Complete your fast today to start a streak'
    : sd.streak === 1 ? 'First day — keep it going!'
    : `${sd.streak} days in a row`;
  html += `
    <div class="streak-card">
      <div class="streak-fire">${fireEmoji}</div>
      <div class="streak-info">
        <div class="streak-num">${sd.streak}<span>day streak</span></div>
        <div class="streak-sub">${streakSub}</div>
      </div>
      <div class="streak-best">best<br><strong>${sd.best}</strong></div>
    </div>`;

  // Chicken progress bar — eating window 12pm (720) to 8pm (1200)
  const WINDOW_START = 12 * 60;
  const WINDOW_END   = 20 * 60;
  const totalMins    = h * 60 + m;
  const pct          = Math.min(100, Math.max(0, (totalMins - WINDOW_START) / (WINDOW_END - WINDOW_START) * 100));
  const isFasting    = totalMins < WINDOW_START;
  const isDone       = totalMins >= WINDOW_END;

  let timeLabel;
  if (isFasting) {
    const rem = WINDOW_START - totalMins;
    timeLabel = `window opens in <span>${Math.floor(rem/60)}h ${pad(rem%60)}m</span>`;
  } else if (isDone) {
    timeLabel = `fasting until <span>12:00 pm</span> — good work 🎉`;
  } else {
    const rem = WINDOW_END - totalMins;
    timeLabel = `<span>${Math.floor(rem/60)}h ${pad(rem%60)}m</span> left in window`;
  }

  html += `
    <div class="chicken-bar">
      <div class="chicken-bar-labels">
        <span class="${!isFasting && !isDone ? 'active-label' : ''}">12 pm</span>
        <span>eating window</span>
        <span class="${isDone ? 'active-label' : ''}">8 pm</span>
      </div>
      <div class="chicken-track">
        <div class="chicken-fill" style="width:${pct}%"></div>
        <div class="chicken-icon" style="left:${Math.max(4, Math.min(96, pct))}%">🐔</div>
      </div>
      <div class="chicken-time">${timeLabel}</div>
    </div>`;

  for (const { key, label, cls, icon } of MEAL_ORDER) {
    const meal = day.meals[key];
      let items = '';
      for (const [name, qty] of meal.items) {
        items += `
          <div class="food-item">
            <span class="food-name">${name}</span>
            ${qty ? `<span class="food-dots"></span><span class="food-qty">${qty}</span>` : ''}
          </div>`;
      }
      html += `
        <div class="meal-card ${cls}">
          <div class="meal-header">
            <span class="meal-icon">${icon}</span>
            <div class="meal-info">
              <div class="meal-label">${label}</div>
              <div class="meal-time">${meal.time}</div>
            </div>
            <div class="meal-cal">${meal.cal}</div>
          </div>
          <div class="food-list">${items}</div>
        </div>`;
  }

  html += `<div class="footer">updated ${fmt12(h, m)}</div>`;
  document.body.innerHTML = html;
}

render();
setInterval(render, 60000);

if ('serviceWorker' in navigator) {
  navigator.serviceWorker.register('./sw.js');
}
</script>
